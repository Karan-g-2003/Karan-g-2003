<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg" width="800" height="180">
  <defs>
    <style>
      /* ── FIGHTER 1 (left, purple) ── */
      @keyframes p1-idle {
        0%,100% { transform: translateY(0px); }
        50%      { transform: translateY(-2px); }
      }
      @keyframes p1-punch {
        0%,100% { transform: translateX(0px); }
        30%     { transform: translateX(14px) scaleX(1.08); }
        60%     { transform: translateX(6px); }
      }
      @keyframes p1-kick {
        0%,100% { transform: translateY(0px) rotate(0deg); }
        40%     { transform: translateY(-10px) rotate(-8deg); }
        70%     { transform: translateY(-4px) rotate(4deg); }
      }
      @keyframes p1-crouch {
        0%,100% { transform: scaleY(1) translateY(0px); }
        50%     { transform: scaleY(0.78) translateY(12px); }
      }

      /* ── FIGHTER 2 (right, cyan) ── */
      @keyframes p2-idle {
        0%,100% { transform: translateY(0px); }
        50%      { transform: translateY(-3px); }
      }
      @keyframes p2-punch {
        0%,100% { transform: translateX(0px) scaleX(-1); }
        30%     { transform: translateX(-16px) scaleX(-1.08); }
        60%     { transform: translateX(-5px) scaleX(-1); }
      }
      @keyframes p2-jump {
        0%,100% { transform: scaleX(-1) translateY(0px); }
        30%     { transform: scaleX(-1) translateY(-22px); }
        70%     { transform: scaleX(-1) translateY(-8px); }
      }

      /* ── HIT FLASH ── */
      @keyframes hit-flash {
        0%,100%       { opacity:0; }
        20%,60%       { opacity:1; }
        40%,80%       { opacity:0.4; }
      }
      /* ── HIT SPARKS ── */
      @keyframes spark {
        0%   { opacity:1; r:2; }
        100% { opacity:0; r:6; }
      }
      @keyframes spark-move1 { 0%{transform:translate(0,0)} 100%{transform:translate(10px,-12px)} }
      @keyframes spark-move2 { 0%{transform:translate(0,0)} 100%{transform:translate(-8px,-14px)} }
      @keyframes spark-move3 { 0%{transform:translate(0,0)} 100%{transform:translate(14px,-6px)} }
      @keyframes spark-move4 { 0%{transform:translate(0,0)} 100%{transform:translate(-12px,-4px)} }
      @keyframes spark-move5 { 0%{transform:translate(0,0)} 100%{transform:translate(4px,-18px)} }

      /* ── HEALTH BARS ── */
      @keyframes hp1-drain {
        0%,40%  { width: 220px; fill: #a78bfa; }
        60%,70% { width: 180px; fill: #f87171; }
        100%    { width: 210px; fill: #a78bfa; }
      }
      @keyframes hp2-drain {
        0%,20%  { width: 220px; }
        50%,60% { width: 165px; }
        100%    { width: 200px; }
      }

      /* ── ENERGY ORBS ── */
      @keyframes orb-pulse {
        0%,100% { r:5; opacity:0.9; }
        50%     { r:7; opacity:1; }
      }
      @keyframes orb-fly {
        0%   { cx:200; opacity:1; }
        100% { cx:560; opacity:0; }
      }

      /* ── GROUND GLOW ── */
      @keyframes glow-pulse {
        0%,100% { opacity:0.25; }
        50%     { opacity:0.5; }
      }

      /* ── SCAN LINE ── */
      @keyframes scan {
        0%   { transform: translateY(0px); opacity:0.06; }
        100% { transform: translateY(180px); opacity:0.06; }
      }

      /* ── COMBO TEXT ── */
      @keyframes combo-pop {
        0%,100% { opacity:0; transform:scale(0.5); }
        15%,75% { opacity:1; transform:scale(1); }
        85%     { opacity:0.5; transform:scale(1.1); }
      }

      /* ── KO FLASH ── */
      @keyframes ko-text {
        0%,100%  { opacity:0; transform:scale(0.3) rotate(-10deg); }
        20%,80%  { opacity:1; transform:scale(1) rotate(0deg); }
        90%      { opacity:0.6; transform:scale(1.15) rotate(3deg); }
      }

      /* ── WHOLE SCENE orchestration via group animation offsets ── */
      #p1 { animation: p1-punch 1.8s ease-in-out 0s infinite, p1-idle 0.9s ease-in-out 0s infinite; transform-origin: 200px 120px; }
      #p2 { animation: p2-punch 1.8s ease-in-out 0.4s infinite, p2-idle 1.1s ease-in-out 0.2s infinite; transform-origin: 570px 120px; transform: scaleX(-1); }
      #p1-kick-layer { animation: p1-kick 2.4s ease-in-out 1.2s infinite; transform-origin: 200px 130px; }
      #p2-jump-layer { animation: p2-jump 2.2s ease-in-out 0.7s infinite; transform-origin: 570px 100px; }

      .hit { animation: hit-flash 1.8s ease-in-out 0.55s infinite; }
      .sp1 { animation: spark 0.6s ease-out 0.6s infinite, spark-move1 0.6s ease-out 0.6s infinite; }
      .sp2 { animation: spark 0.6s ease-out 0.65s infinite, spark-move2 0.6s ease-out 0.65s infinite; }
      .sp3 { animation: spark 0.6s ease-out 0.7s infinite, spark-move3 0.6s ease-out 0.7s infinite; }
      .sp4 { animation: spark 0.6s ease-out 0.75s infinite, spark-move4 0.6s ease-out 0.75s infinite; }
      .sp5 { animation: spark 0.6s ease-out 0.8s infinite, spark-move5 0.6s ease-out 0.8s infinite; }

      .hp1-bar { animation: hp1-drain 3.6s ease-in-out infinite; }
      .hp2-bar { animation: hp2-drain 3.6s ease-in-out 0.4s infinite; fill: #22d3ee; }

      .orb { animation: orb-pulse 0.8s ease-in-out infinite; }
      .orb-fly { animation: orb-fly 1.8s ease-in-out 0.9s infinite; }
      .glow { animation: glow-pulse 2s ease-in-out infinite; }
      .scan { animation: scan 2s linear infinite; }
      .combo { animation: combo-pop 3.6s ease-in-out 0.3s infinite; transform-origin: 400px 50px; }
      .ko    { animation: ko-text 3.6s ease-in-out 1.8s infinite; transform-origin: 400px 80px; }
    </style>

    <!-- deep space background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0010"/>
      <stop offset="60%"  stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>

    <!-- ground glow -->
    <radialGradient id="groundGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%"   stop-color="#7b2fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
    </radialGradient>

    <!-- player auras -->
    <radialGradient id="aura1" cx="50%" cy="80%" r="50%">
      <stop offset="0%"  stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura2" cx="50%" cy="80%" r="50%">
      <stop offset="0%"  stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- star pattern -->
    <pattern id="stars" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="5"  cy="8"  r="0.8" fill="white" opacity="0.6"/>
      <circle cx="20" cy="3"  r="0.5" fill="white" opacity="0.4"/>
      <circle cx="35" cy="18" r="0.9" fill="white" opacity="0.7"/>
      <circle cx="12" cy="28" r="0.6" fill="white" opacity="0.3"/>
      <circle cx="30" cy="35" r="0.7" fill="white" opacity="0.5"/>
      <circle cx="2"  cy="35" r="0.4" fill="white" opacity="0.6"/>
    </pattern>

    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="strong-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="800" height="180" fill="url(#bg)"/>
  <rect width="800" height="180" fill="url(#stars)" opacity="0.8"/>

  <!-- scan line effect -->
  <rect class="scan" width="800" height="2" fill="white" opacity="0.06"/>

  <!-- ground glow -->
  <ellipse class="glow" cx="400" cy="175" rx="380" ry="40" fill="url(#groundGlow)"/>

  <!-- ground line -->
  <line x1="0" y1="148" x2="800" y2="148" stroke="#7b2fff" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="149" x2="800" y2="149" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>

  <!-- ══ HUD ══ -->
  <!-- HP bar bg -->
  <rect x="20" y="10" width="230" height="14" rx="2" fill="#1a0533" stroke="#7b2fff" stroke-width="1"/>
  <rect x="550" y="10" width="230" height="14" rx="2" fill="#1a0533" stroke="#22d3ee" stroke-width="1"/>

  <!-- HP bars -->
  <rect class="hp1-bar" x="22" y="12" height="10" rx="1"/>
  <rect class="hp2-bar" x="552" y="12" height="10" rx="1"/>

  <!-- HP labels -->
  <text x="30" y="21" font-family="monospace" font-size="7" fill="#c8b8ff" font-weight="bold">SPECTER</text>
  <text x="558" y="21" font-family="monospace" font-size="7" fill="#67e8f9" font-weight="bold">PHANTOM</text>

  <!-- ROUND indicator -->
  <text x="360" y="20" font-family="monospace" font-size="9" fill="#f59e0b" font-weight="bold" text-anchor="middle">ROUND 2</text>
  <text x="360" y="30" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="middle">★ ★ ★</text>

  <!-- ══ PLAYER AURAS ══ -->
  <ellipse cx="200" cy="135" rx="55" ry="18" fill="url(#aura1)" opacity="0.6"/>
  <ellipse cx="570" cy="135" rx="55" ry="18" fill="url(#aura2)" opacity="0.6"/>

  <!-- ══ FIGHTER 1 — SPECTER (purple) ══ -->
  <g id="p1-kick-layer">
  <g id="p1" filter="url(#glow-filter)">
    <!-- shadow -->
    <ellipse cx="200" cy="147" rx="22" ry="4" fill="#7b2fff" opacity="0.4"/>
    <!-- body -->
    <rect x="187" y="110" width="24" height="28" rx="2" fill="#7b2fff"/>
    <!-- chest stripe -->
    <rect x="193" y="113" width="12" height="4" rx="1" fill="#a78bfa"/>
    <!-- head -->
    <rect x="189" y="96" width="20" height="18" rx="3" fill="#c8b8ff"/>
    <!-- eye -->
    <rect x="193" y="101" width="5" height="4" rx="1" fill="#7b2fff"/>
    <rect x="200" y="101" width="5" height="4" rx="1" fill="#7b2fff"/>
    <!-- visor glow -->
    <rect x="193" y="102" width="5" height="2" rx="0.5" fill="#e0c4ff" opacity="0.8"/>
    <rect x="200" y="102" width="5" height="2" rx="0.5" fill="#e0c4ff" opacity="0.8"/>
    <!-- hair spikes -->
    <polygon points="192,96 196,88 199,96" fill="#4c1d95"/>
    <polygon points="197,96 201,86 204,96" fill="#5b21b6"/>
    <polygon points="202,96 206,89 208,96" fill="#4c1d95"/>
    <!-- left arm (punch arm) -->
    <rect x="211" y="112" width="20" height="8" rx="2" fill="#a78bfa"/>
    <rect x="229" y="110" width="8" height="10" rx="2" fill="#c8b8ff"/>
    <!-- right arm -->
    <rect x="176" y="114" width="12" height="7" rx="2" fill="#a78bfa"/>
    <!-- legs -->
    <rect x="188" y="136" width="10" height="14" rx="2" fill="#5b21b6"/>
    <rect x="200" y="136" width="10" height="14" rx="2" fill="#5b21b6"/>
    <!-- boots -->
    <rect x="186" y="147" width="13" height="5" rx="1" fill="#7b2fff"/>
    <rect x="198" y="147" width="13" height="5" rx="1" fill="#7b2fff"/>
    <!-- belt -->
    <rect x="187" y="134" width="24" height="4" rx="1" fill="#a78bfa"/>
    <rect x="197" y="134" width="4" height="4" rx="0.5" fill="#f59e0b"/>
  </g>
  </g>

  <!-- ══ FIGHTER 2 — PHANTOM (cyan) ══ -->
  <g id="p2-jump-layer">
  <g id="p2" filter="url(#glow-filter)">
    <!-- shadow -->
    <ellipse cx="570" cy="147" rx="22" ry="4" fill="#0891b2" opacity="0.4"/>
    <!-- body (mirrored via scaleX(-1) on parent) -->
    <rect x="557" y="110" width="24" height="28" rx="2" fill="#0e7490"/>
    <!-- chest stripe -->
    <rect x="563" y="113" width="12" height="4" rx="1" fill="#22d3ee"/>
    <!-- head -->
    <rect x="559" y="96" width="20" height="18" rx="3" fill="#cffafe"/>
    <!-- eyes -->
    <rect x="563" y="101" width="5" height="4" rx="1" fill="#0891b2"/>
    <rect x="570" y="101" width="5" height="4" rx="1" fill="#0891b2"/>
    <!-- visor glow -->
    <rect x="563" y="102" width="5" height="2" rx="0.5" fill="#a5f3fc" opacity="0.8"/>
    <rect x="570" y="102" width="5" height="2" rx="0.5" fill="#a5f3fc" opacity="0.8"/>
    <!-- hair -->
    <polygon points="562,96 565,87 568,96" fill="#164e63"/>
    <polygon points="567,96 570,85 573,96" fill="#155e75"/>
    <polygon points="572,96 575,88 577,96" fill="#164e63"/>
    <!-- punch arm (toward p1) -->
    <rect x="549" y="112" width="20" height="8" rx="2" fill="#22d3ee"/>
    <rect x="541" y="110" width="9" height="10" rx="2" fill="#cffafe"/>
    <!-- back arm -->
    <rect x="580" y="114" width="12" height="7" rx="2" fill="#22d3ee"/>
    <!-- legs -->
    <rect x="558" y="136" width="10" height="14" rx="2" fill="#155e75"/>
    <rect x="570" y="136" width="10" height="14" rx="2" fill="#155e75"/>
    <!-- boots -->
    <rect x="556" y="147" width="13" height="5" rx="1" fill="#0891b2"/>
    <rect x="568" y="147" width="13" height="5" rx="1" fill="#0891b2"/>
    <!-- belt -->
    <rect x="557" y="134" width="24" height="4" rx="1" fill="#22d3ee"/>
    <rect x="567" y="134" width="4" height="4" rx="0.5" fill="#f59e0b"/>
  </g>
  </g>

  <!-- ══ HIT EFFECTS (between fighters) ══ -->
  <g class="hit">
    <!-- impact star -->
    <polygon points="385,115 390,105 395,115 405,110 397,120 405,130 395,125 390,135 385,125 375,130 383,120 375,110"
             fill="#fbbf24" opacity="0.95" filter="url(#strong-glow)"/>
    <polygon points="388,112 390,108 392,112 396,110 393,115 396,120 392,118 390,122 388,118 384,120 387,115 384,110"
             fill="white" opacity="0.8"/>
  </g>

  <!-- sparks -->
  <g transform="translate(390,118)">
    <circle class="sp1" r="2" fill="#fbbf24"/>
    <circle class="sp2" r="2" fill="#f87171"/>
    <circle class="sp3" r="2" fill="#a78bfa"/>
    <circle class="sp4" r="2" fill="#22d3ee"/>
    <circle class="sp5" r="2" fill="white"/>
  </g>

  <!-- ══ ENERGY ORB ══ -->
  <circle class="orb" cx="250" cy="118" r="5" fill="#a78bfa" filter="url(#glow-filter)"/>
  <circle class="orb-fly" cy="118" r="4" fill="#a78bfa" filter="url(#strong-glow)"/>

  <!-- ══ COMBO TEXT ══ -->
  <g class="combo">
    <text x="400" y="58" font-family="monospace" font-size="18" fill="#fbbf24"
          font-weight="bold" text-anchor="middle" filter="url(#strong-glow)">COMBO x3!</text>
    <text x="400" y="58" font-family="monospace" font-size="18" fill="#fbbf24"
          font-weight="bold" text-anchor="middle" opacity="0.3">COMBO x3!</text>
  </g>

  <!-- ══ KO TEXT ══ -->
  <g class="ko">
    <text x="400" y="85" font-family="monospace" font-size="26" fill="#f87171"
          font-weight="bold" text-anchor="middle" filter="url(#strong-glow)" letter-spacing="6">K.O.</text>
    <text x="400" y="85" font-family="monospace" font-size="26" fill="white"
          font-weight="bold" text-anchor="middle" opacity="0.2" letter-spacing="6">K.O.</text>
  </g>

  <!-- ══ BOTTOM LABEL ══ -->
  <text x="400" y="165" font-family="monospace" font-size="8" fill="#a78bfa"
        text-anchor="middle" opacity="0.7" letter-spacing="3">— KARAN GHUWALEWALA · ECE 2026 · VIT CHENNAI —</text>
</svg>
